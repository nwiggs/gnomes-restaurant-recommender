<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Finder</title>
</head>
<body>
    <h1>Dallas Restaurant Recommender</h1>

    <form action="/recommend" method="POST">
        <label>Cuisine:</label>
        <select name="cuisine">
            <option>Any</option>
            <option>American</option>
            <option>Mexican</option>
        </select>

        <br><br>

        <label>Price:</label>
        <select name="price">
            <option>Any</option>
            <option>$</option>
            <option>$$</option>
        </select>

        <br><br>

        <label>Dietary:</label>
        <select name="dietary">
            <option>Any</option>
            <option>vegetarian</option>
            <option>vegan</option>
        </select>

        <br><br>

        <button type="submit">Find Restaurants</button>
    </form>
</body>
</html>
